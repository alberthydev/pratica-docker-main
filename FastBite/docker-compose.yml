services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastbite-dev

    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
    networks:
      - dev-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - dev-network
    restart: unless-stopped

networks:
  dev-network:
    driver: bridge